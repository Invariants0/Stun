apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: stun-backend
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 30
      containers:
        - image: gcr.io/PROJECT_ID/stun-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: GCP_PROJECT_ID
              value: PROJECT_ID
            - name: GCP_REGION
              value: us-central1
